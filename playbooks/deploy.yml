---
# Deploy one project to its host.
#
#   ansible-playbook playbooks/deploy.yml -e project=routing -e src_base=$PWD
#
# In CI, src_base defaults to $GITHUB_WORKSPACE (the service checkout).

# Play 1 — stage the vaulted SSH key on the control node so play 2 can connect
# as the deploy user. One vault password unlocks everything.
- name: Stage deploy SSH key
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/all/vars.yml
    - ../inventory/group_vars/all/vault.yml
  tasks:
    - name: Write private key for host connection
      ansible.builtin.copy:
        content: "{{ deploy_ssh_private_key }}"
        dest: "{{ deploy_key_path }}"
        mode: "0600"

# Play 2 — deploy on the target. The project's `mode` picks the role:
#   rsync  (default) -> deploy_compose : ship a folder + build on host
#   image            -> deploy_image   : render compose template + pull images
- name: Deploy project
  hosts: "{{ target | default('deploy_targets') }}"
  gather_facts: false
  tasks:
    - name: Select deploy role by project mode
      ansible.builtin.include_role:
        name: "{{ 'deploy_image' if (projects[project].mode | default('rsync')) == 'image' else 'deploy_compose' }}"
