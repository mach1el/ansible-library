---
# =============================================================================
# Centralized deployment configuration — single source of truth.
# Non-secret values live here (committed in clear). Secrets live in vault.yml
# (ansible-vault encrypted) and are referenced through the indirection vars at
# the bottom of this file.
# =============================================================================

# --- Fleet-wide defaults ------------------------------------------------------
deploy_user: apexvoid
deploy_root: /home/apexvoid/deployment
# Where CI/control node stages the (vaulted) private key used to reach the host.
deploy_key_path: /tmp/apexvoid_deploy_key

# Public half of the deploy key — not secret, authorized by init_env.
deploy_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBcjRObOeBWkIFHcmOZfnWpC0dSwkH7oKfOev4sBzQkf github-actions-deploy@apexvoid"

# --- Per-project deploy table -------------------------------------------------
# Add a service here and it becomes deployable: ansible-playbook deploy.yml -e project=<key>
projects:
  # rsync mode (default): ship a folder and build/run on the host.
  routing:
    repo_dir: routing                 # subdir created under deploy_root
    source: deployment-template       # folder inside the service checkout to ship
    compose_files:
      - docker-compose.yml
      - docker-compose.prod.yml
    compose_args: "up -d --remove-orphans --force-recreate"
    rsync_excludes: [".git", ".github", ".env", "certbot"]
    # nginx config is bind-mounted; reload after syncing new config.
    reload_cmd: "docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T nginx nginx -s reload"
    health_url: "http://127.0.0.1/_routing/health"

  # image mode: render a compose Jinja template with the pushed image tag, pull, up.
  apexvoid-occult:
    mode: image
    repo_dir: apexvoid-occult
    source: deployment-template       # holds docker-compose.yml.j2
    compose_template: docker-compose.yml.j2
    expected_services: 2              # backend + frontend

  apexvoid-trading:
    mode: image
    repo_dir: apexvoid-trading
    source: deployment-template       # holds docker-compose.yml.j2
    compose_template: docker-compose.yml.j2
    expected_services: 1              # frontend only (no secret env)

  apexvoid-trading-bot:
    mode: image
    repo_dir: apexvoid-trading-bot
    source: deployment-template       # holds docker-compose.yml.j2
    compose_template: docker-compose.yml.j2
    expected_services: 3              # bot + postgres + redis

# --- Per-project non-secret settings -----------------------------------------
registry_namespace: mich43l
routing_network: routing

# apexvoid-occult backend runtime config (non-secret; env injected via compose template)
apexvoid_occult_gemini_model: "gemini-2.5-flash"
apexvoid_occult_gemini_thinking_budget: "8192"
apexvoid_occult_gemini_max_output_tokens: "24576"
apexvoid_occult_allow_origins: "https://apexvoid.net,https://fate.apexvoid.net"

# --- Secret indirection (values come from vault.yml) --------------------------
# Roles reference these names; only vault.yml holds the actual material.
deploy_ssh_private_key: "{{ vault_deploy_ssh_private_key }}"
apexvoid_occult_gemini_api_key: "{{ vault_apexvoid_occult_gemini_api_key }}"
# Whole bot env (tokens, channel/owner IDs, config) kept encrypted in the vault.
apexvoid_trading_bot_env: "{{ vault_apexvoid_trading_bot_env }}"
